version: "3.9"

services:
  app:
    build: .
    container_name: meetup-dashboard   # 👈 add this
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    environment:
      - PORT=8501
    command: >
      sh -c "streamlit run meetup.py
      --server.port=8501
      --server.address=0.0.0.0"
