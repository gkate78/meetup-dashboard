name: Refresh Meetup Snapshot

on:
  schedule:
    - cron: '0 3 * * *' # daily at 03:00 UTC
  workflow_dispatch: {}

jobs:
  refresh-snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run snapshot fetch (file backend)
        env:
          MEETUP_TOKEN: ${{ secrets.MEETUP_TOKEN }}
          SNAPSHOT_BACKEND: file
          DATA_TTL_SECONDS: 86400
        run: |
          python fetch_snapshot.py
